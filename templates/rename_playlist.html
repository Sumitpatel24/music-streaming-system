<!DOCTYPE html>
<html>
<head>
    <title>Rename Playlist</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:linear-gradient(135deg,#000000,#0d1117);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:'Segoe UI',sans-serif;
        }

        .rename-card{
            width:600px;
            background:#161b22;
            padding:45px;
            border-radius:25px;
            box-shadow:0 0 30px rgba(255,193,7,0.15);
            animation:glow 2s infinite alternate;
            transition:0.3s;
        }

        .rename-card:hover{
            transform:translateY(-5px);
        }

        .icon{
            text-align:center;
            font-size:70px;
            margin-bottom:10px;
        }

        .title{
            text-align:center;
            color:#ffc107;
            font-size:42px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:#8b949e;
            margin-bottom:30px;
        }

        label{
            color:white;
            font-size:18px;
            font-weight:500;
            margin-bottom:10px;
            display:block;
        }

        .form-control{
            height:60px;
            background:#21262d;
            border:1px solid #30363d;
            color:white;
            border-radius:15px;
            font-size:18px;
        }

        .form-control:focus{
            background:#21262d;
            color:white;
            border-color:#ffc107;
            box-shadow:0 0 15px rgba(255,193,7,0.35);
        }

        .btn-update{
            width:100%;
            height:55px;
            background:#ffc107;
            border:none;
            border-radius:15px;
            font-size:18px;
            font-weight:bold;
            color:black;
            margin-top:20px;
            transition:0.3s;
        }

        .btn-update:hover{
            background:#ffca2c;
            transform:scale(1.02);
        }

        .btn-back{
            width:100%;
            height:55px;
            border-radius:15px;
            margin-top:10px;
            font-size:17px;
            font-weight:bold;
        }

        @keyframes glow{

            from{
                box-shadow:0 0 20px rgba(255,193,7,0.10);
            }

            to{
                box-shadow:0 0 40px rgba(255,193,7,0.30);
            }

        }

    </style>

</head>

<body>

<div class="rename-card">

    <div class="icon">
        ✏️
    </div>

    <div class="title">
        Rename Playlist
    </div>

    <div class="subtitle">
        Update your playlist name
    </div>

    <form method="POST">

        <label>
            🎵 Playlist Name
        </label>

        <input
            type="text"
            name="playlist_name"
            value="{{ playlist[2] }}"
            class="form-control"
            maxlength="50"
            required>

        <button
            type="submit"
            class="btn-update">
            ✅ Update Playlist
        </button>

        <a href="/my_playlists"
           class="btn btn-secondary btn-back">
           ⬅ Back To Playlists
        </a>

    </form>

</div>

</body>
</html>
