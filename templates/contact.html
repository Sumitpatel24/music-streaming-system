<!DOCTYPE html>
<html>
<head>

<title>Contact Us</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#000000,#0d1117,#161b22);
    color:white;
    font-family:'Segoe UI',sans-serif;
}

.contact-box{
    max-width:800px;
    margin:50px auto;
    background:#161b22;
    padding:40px;
    border-radius:25px;
    border:1px solid #30363d;
    box-shadow:0 0 25px rgba(0,255,150,0.15);
}

.title{
    text-align:center;
    font-size:45px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#8b949e;
    margin-bottom:30px;
}

.form-control{
    background:#21262d;
    border:1px solid #30363d;
    color:white;
    border-radius:12px;
    margin-bottom:15px;
}

.form-control:focus{
    background:#21262d;
    color:white;
    border-color:#1DB954;
    box-shadow:0 0 12px rgba(29,185,84,0.4);
}

.btn-send{
    width:100%;
    background:#1DB954;
    border:none;
    padding:12px;
    border-radius:12px;
    color:white;
    font-weight:bold;
}

.info{
    margin-top:30px;
    padding-top:20px;
    border-top:1px solid #30363d;
}

.info p{
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="contact-box">

    <h1 class="title">
        📞 Contact Us
    </h1>

    <p class="subtitle">
        We'd love to hear from you
    </p>

    <form>

        <input
            type="text"
            class="form-control"
            placeholder="👤 Your Name">

        <input
            type="email"
            class="form-control"
            placeholder="📧 Your Email">

        <textarea
            class="form-control"
            rows="5"
            placeholder="💬 Your Message"></textarea>

        <button
            type="submit"
            class="btn-send">
            Send Message
        </button>

    </form>

    <div class="info">

        <p>📧 Email: sumitpatelofficial05@gmail.com</p>

        <p>📍 Address: Pune, Maharashtra, India</p>

    </div>

</div>

</body>
</html>
