<!DOCTYPE html>
<html>
<head>
    <title>Delete Playlist</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:linear-gradient(135deg,#0d1117,#000000);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial,sans-serif;
        }

        .delete-card{
            width:550px;
            background:#161b22;
            padding:40px;
            border-radius:25px;
            text-align:center;
            box-shadow:0 0 30px rgba(255,0,0,0.25);
            animation:glow 2s infinite alternate;
        }

        .delete-icon{
            font-size:80px;
            margin-bottom:15px;
        }

        h1{
            color:white;
            font-size:40px;
            margin-bottom:15px;
        }

        p{
            color:#b0b0b0;
            font-size:18px;
            margin-bottom:25px;
        }

        .playlist-name{
            color:#ffc107;
            font-size:24px;
            font-weight:bold;
            margin-bottom:25px;
        }

        .btn{
            padding:12px 25px;
            font-size:18px;
            border-radius:12px;
            margin:5px;
        }

        @keyframes glow{

            from{
                box-shadow:0 0 20px rgba(255,0,0,0.20);
            }

            to{
                box-shadow:0 0 40px rgba(255,0,0,0.40);
            }

        }

    </style>

</head>
<body>

<div class="playlist-card">

    <h1 class="title">
        🎵 Create Playlist
    </h1>

    <p class="subtitle">
        Create your own music playlist and organize songs
    </p>

    <form method="POST" enctype="multipart/form-data">

        <label>
            🎶 Playlist Name
        </label>

        <input
            type="text"
            name="playlist_name"
            class="form-control"
            placeholder="Example: My Gym Songs"
            maxlength="50"
            required>

        <div class="text-note">
            Maximum 50 characters allowed
        </div>

        <label class="mt-3">
            🖼 Playlist Cover Image
        </label>

        <input
            type="file"
            name="cover_image"
            class="form-control">

        <div class="text-note">
            Upload JPG, PNG or JPEG image
        </div>

        <button
            type="submit"
            class="btn-create">
            ➕ Create Playlist
        </button>

        <a href="/songs"
           class="btn btn-secondary btn-back">
           ⬅ Back To Music Library
        </a>

    </form>

</div>

</body>
</html>
