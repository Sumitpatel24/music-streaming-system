<!DOCTYPE html>
<html>
<head>

    <title>Manage Users</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>

        body{
            background:#0d1117;
            color:white;
            min-height:100vh;
        }

        .container-box{
            margin-top:40px;
        }

        .title{
            font-size:45px;
            font-weight:bold;
            margin-bottom:25px;
        }

        .table-container{
            background:#161b22;
            padding:25px;
            border-radius:20px;
            box-shadow:0 0 25px rgba(0,255,150,0.15);
        }

        .table{
            margin-bottom:0;
        }

        .table thead th{
            background:#21262d;
            color:#58a6ff;
            border-color:#30363d;
            font-size:18px;
        }

        .table tbody td{
            border-color:#30363d;
            vertical-align:middle;
        }

        .table tbody tr:hover{
            background:#21262d;
            transition:0.3s;
        }

        .btn-back{
            margin-bottom:20px;
        }

        .user-count{
            background:#161b22;
            padding:20px;
            border-radius:15px;
            margin-bottom:20px;
            text-align:center;
            box-shadow:0 0 20px rgba(0,255,150,0.1);
        }

        .user-count h2{
            font-size:40px;
            font-weight:bold;
            color:#58a6ff;
        }

        .user-count p{
            margin:0;
            color:#c9d1d9;
        }
         #userSearch{
           background:#161b22;
           color:white;
           border:2px solid #1DB954;
           border-radius:15px;
           padding:15px 20px;
           font-size:22px;
        }

        #userSearch::placeholder{
          color:#c9d1d9;
      }
    </style>

</head>

<body>

<div class="container container-box">

<h1 class="title">
    👥 Manage Users
</h1>

<div class="mb-4">

    <input
        type="text"
        id="userSearch"
        class="form-control"
        placeholder="🔍 Search Username or Email..."
        onkeyup="searchUsers()">

</div>

<div id="userNotFound"
     style="
     display:none;
     color:red;
     font-size:25px;
     font-weight:bold;
     text-align:center;
     margin-bottom:20px;">

     ❌ User Not Found

</div>

<div class="user-count">

    <h2>{{ users|length }}</h2>

    <p>Total Registered Users</p>

</div>

<a href="/admin"
   class="btn btn-secondary btn-back">
   ← Back To Dashboard
</a>

<div class="table-container">

    <table id="userTable"
           class="table table-dark table-bordered table-hover">

        <thead>

            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Action</th>
            </tr>

        </thead>

        <tbody>

            {% for user in users %}

            <tr>

                <td>{{ loop.index }}</td>

                <td>{{ user[1] }}</td>

                <td>{{ user[2] }}</td>

                <td>

                    <form
                        action="/delete_user/{{ user[0] }}"
                        method="POST">

                        <button
                            type="submit"
                            class="btn btn-danger btn-sm"
                            onclick="return confirm('Delete this user permanently?')">

                            Delete User

                        </button>

                    </form>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

<script>

function searchUsers() {

    let input = document.getElementById("userSearch");
    let filter = input.value.toLowerCase();

    let table = document.getElementById("userTable");
    let tr = table.getElementsByTagName("tr");

    let found = false;

    for(let i = 1; i < tr.length; i++) {

        let rowText = tr[i].innerText.toLowerCase();

        if(rowText.includes(filter)) {

            tr[i].style.display = "";
            found = true;

        } else {

            tr[i].style.display = "none";

        }
    }

    let msg = document.getElementById("userNotFound");

    if(filter !== "" && !found){

        msg.style.display = "block";

    }else{

        msg.style.display = "none";

    }
}

</script>
</body>
</html>
