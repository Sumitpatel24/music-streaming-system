<!DOCTYPE html>
<html>
<head>
    <title>Edit Song</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>

body{
    background:linear-gradient(135deg,#0f172a,#111827,#000000);
    min-height:100vh;
    color:white;
    font-family:'Segoe UI',sans-serif;
}

.edit-card{
    max-width:700px;
    margin:50px auto;
    padding:35px;
    background:rgba(22,27,34,0.95);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:25px;
    backdrop-filter:blur(15px);

    box-shadow:
    0 0 25px rgba(0,255,150,0.12),
    0 0 50px rgba(0,0,0,0.4);

    transition:0.4s;
}

.edit-card:hover{
    transform:translateY(-5px);

    box-shadow:
    0 0 30px rgba(29,185,84,0.3),
    0 0 60px rgba(29,185,84,0.15);
}

h1{
    text-align:center;
    margin-bottom:30px;
    font-weight:700;
    color:white;

    text-shadow:
    0 0 10px #1DB954,
    0 0 20px rgba(29,185,84,0.4);
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#d1d5db;
}

.form-control{
    background:#21262d !important;
    color:white !important;
    border:1px solid #30363d !important;
    border-radius:12px;
    padding:12px;
    transition:0.3s;
}

.form-control:focus{
    background:#21262d !important;
    color:white !important;
    border-color:#1DB954 !important;

    box-shadow:
    0 0 10px rgba(29,185,84,0.4) !important;
}

.current-image{
    width:180px;
    border-radius:15px;
    border:3px solid #1DB954;

    box-shadow:
    0 0 15px rgba(29,185,84,0.4);

    transition:0.3s;
}

.current-image:hover{
    transform:scale(1.05);

    box-shadow:
    0 0 20px #1DB954,
    0 0 35px rgba(29,185,84,0.5);
}

.btn-success{
    background:linear-gradient(
        135deg,
        #22c55e,
        #16a34a
    );

    border:none;
    border-radius:12px;
    font-weight:bold;
    padding:10px 20px;
}

.btn-success:hover{
    transform:translateY(-3px);

    box-shadow:
    0 0 15px #22c55e,
    0 0 30px rgba(34,197,94,0.6);
}

.btn-secondary{
    border-radius:12px;
    font-weight:bold;
    padding:10px 20px;
    margin-left:10px;
}

.btn-secondary:hover{
    transform:translateY(-3px);

    box-shadow:
    0 0 15px #9ca3af,
    0 0 30px rgba(156,163,175,0.4);
}

</style>
</head>
<body>

<div class="edit-card">

    <h1>Edit Song</h1>

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">
            <label>Song Name</label>
            <input
                type="text"
                name="song_name"
                value="{{ song[1] }}"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Singer Name</label>
            <input
                type="text"
                name="singer"
                value="{{ song[2] }}"
                class="form-control"
                required>
        </div>

        <div class="mb-3">

            <label>Current Image</label>
            <br><br>

            {% if song[4] %}
                <img
                    src="{{ url_for('static', filename='images/' + song[4]) }}"
                    width="180"
                    style="border-radius:10px;">
            {% else %}
                <p>No Image Found</p>
            {% endif %}

        </div>

        <div class="mb-3">

            <label>Upload New Image</label>

            <input
                type="file"
                name="image"
                class="form-control"
                accept="image/*">

        </div>

        <button type="submit" class="btn btn-success">
            Update Song
        </button>

        <a href="/admin" class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>
