<!DOCTYPE html>
<html>
<head>
    <title>Edit Song</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        body{
            background:#0d1117;
            color:white;
        }

        .edit-card{
            background:#161b22;
            max-width:600px;
            margin:50px auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        .form-control{
            background:#21262d;
            border:none;
            color:white;
        }

        .form-control:focus{
            background:#21262d;
            color:white;
            box-shadow:none;
            border:1px solid #198754;
        }

        label{
            margin-bottom:8px;
            font-weight:bold;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
        }
    </style>
</head>
<body>

<div class="edit-card">

    <h1>Edit Song</h1>

    <form method="POST">

        <div class="mb-3">
            <label>Song Name</label>
            <input
                type="text"
                name="song_name"
                value="{{ song[1] }}"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Singer Name</label>
            <input
                type="text"
                name="singer"
                value="{{ song[2] }}"
                class="form-control"
                required>
        </div>

        <button type="submit" class="btn btn-success">
            Update Song
        </button>

        <a href="/admin" class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>
