<!DOCTYPE html>
<html>
<head>
    <title>Recently Played Songs</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>

        body{
            background:linear-gradient(135deg,#000,#0d1117);
            color:white;
            min-height:100vh;
        }

        .header{
            text-align:center;
            padding:40px;
        }

        .header h1{
            color:#1DB954;
            font-size:50px;
            font-weight:bold;
        }

        .song-card{
            background:#161b22;
            border-radius:20px;
            padding:20px;
            text-align:center;
            margin-bottom:25px;
            transition:0.3s;
        }

        .song-card:hover{
            transform:translateY(-8px);
            box-shadow:0 0 25px rgba(0,255,150,0.30);
        }

        .song-image{
            width:220px;
            height:220px;
            object-fit:cover;
            border-radius:15px;
            margin-bottom:15px;
        }

        .empty-box{
            background:#161b22;
            padding:50px;
            border-radius:20px;
            text-align:center;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="header">

        <h1>🕒 Recently Played</h1>

        <p>
            Your last played songs
        </p>

        <a href="/profile"
           class="btn btn-primary">
           ⬅ Back To Profile
        </a>

    </div>

    {% if songs %}

    <div class="row">

        {% for song in songs %}

        <div class="col-md-4">

            <div class="song-card">

                <img src="{{ url_for('static', filename='images/' + song[4]) }}"
                     class="song-image">

                <h3>{{ song[1] }}</h3>

                <p>🎤 {{ song[2] }}</p>

                <audio controls style="width:100%;">
                    <source src="{{ url_for('static', filename='songs/' + song[3]) }}">
                </audio>

            </div>

        </div>

        {% endfor %}

    </div>

    {% else %}

    <div class="empty-box">

        <h2>No Songs Played Yet</h2>

        <a href="/songs"
           class="btn btn-success">
           🎵 Go To Music Library
        </a>

    </div>

    {% endif %}

</div>
...
</div>

<script>

const audios = document.querySelectorAll("audio");

audios.forEach(audio => {

    audio.addEventListener("play", function() {

        audios.forEach(otherAudio => {

            if (otherAudio !== this) {
                otherAudio.pause();
            }

        });

    });

});

</script>

</body>
</body>
</html>
