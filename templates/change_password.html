<!DOCTYPE html>
<html>
<head>
    <title>Change Password</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#0d1117;
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .card{
            width:700px;
            background:#161b22;
            padding:40px;
            border-radius:20px;
            box-shadow:0 0 25px rgba(0,255,150,0.15);
        }

        h1{
            text-align:center;
            color:white;
            margin-bottom:30px;
            font-size:42px;
            font-weight:bold;
        }

        label{
            color:white;
            font-size:18px;
            margin-bottom:8px;
            display:block;
        }

        .form-control{
            background:#21262d;
            border:1px solid #30363d;
            color:white;
            height:55px;
            font-size:18px;
        }

        .form-control:focus{
            background:#21262d;
            color:white;
            border-color:#0d6efd;
            box-shadow:none;
        }

        .input-group-text{
            cursor:pointer;
            background:#21262d;
            color:white;
            border:1px solid #30363d;
        }

        .btn{
            padding:10px 20px;
            font-size:18px;
        }

        .password-note{
            color:#8b949e;
            font-size:14px;
            margin-top:5px;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>🔒 Change Password</h1>

    <form method="POST">

        <div class="mb-3">

            <label>Old Password</label>

            <div class="input-group">

                <input
                    type="password"
                    id="oldPassword"
                    name="old_password"
                    class="form-control"
                    required>

                <span class="input-group-text"
                      onclick="toggleOldPassword()">
                    <i class="bi bi-eye"></i>
                </span>

            </div>

        </div>

        <div class="mb-3">

            <label>New Password</label>

            <div class="input-group">

                <input
                    type="password"
                    id="newPassword"
                    name="new_password"
                    class="form-control"
                    required>

                <span class="input-group-text"
                      onclick="toggleNewPassword()">
                    <i class="bi bi-eye"></i>
                </span>

            </div>

            <div class="password-note">
                Password should contain at least 6 characters.
            </div>

        </div>

        <button
            type="submit"
            class="btn btn-success">
            Update Password
        </button>

        <a href="/profile"
           class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

<script>

function toggleOldPassword() {

    let x = document.getElementById("oldPassword");

    if (x.type === "password") {
        x.type = "text";
    } else {
        x.type = "password";
    }
}

function toggleNewPassword() {

    let x = document.getElementById("newPassword");

    if (x.type === "password") {
        x.type = "text";
    } else {
        x.type = "password";
    }
}

</script>

</body>
</html>
