<!DOCTYPE html>
<html>
<head>
    <title>Create Playlist</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:linear-gradient(135deg,#0d1117,#161b22);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial,sans-serif;
        }

        .playlist-card{
            width:550px;
            background:#161b22;
            padding:40px;
            border-radius:25px;
            animation:glow 2s infinite alternate;
            transition:0.3s;
        }

        .playlist-card:hover{
            transform:translateY(-5px);
        }

        .title{
            text-align:center;
            color:white;
            font-size:42px;
            font-weight:bold;
            margin-bottom:15px;
        }

        .subtitle{
            text-align:center;
            color:#8b949e;
            margin-bottom:30px;
            font-size:16px;
        }

        label{
            color:white;
            font-size:18px;
            margin-bottom:10px;
            display:block;
            font-weight:500;
        }

        .form-control{
            height:55px;
            background:#21262d;
            border:1px solid #30363d;
            color:white;
            border-radius:12px;
            font-size:16px;
        }

        .form-control:focus{
            background:#21262d;
            color:white;
            border-color:#1DB954;
            box-shadow:0 0 12px rgba(29,185,84,0.5);
        }

        .text-note{
            color:#8b949e;
            font-size:14px;
            margin-top:8px;
        }

        .btn-create{
            width:100%;
            height:55px;
            background:#1DB954;
            border:none;
            border-radius:12px;
            color:white;
            font-size:18px;
            font-weight:bold;
            margin-top:20px;
            transition:0.3s;
        }

        .btn-create:hover{
            background:#18a34a;
            transform:scale(1.02);
        }

        .btn-back{
            width:100%;
            margin-top:12px;
            height:50px;
            border-radius:12px;
        }

        @keyframes glow{

            from{
                box-shadow:0 0 20px rgba(0,255,150,0.15);
            }

            to{
                box-shadow:0 0 40px rgba(0,255,150,0.35);
            }

        }

    </style>
</head>

<body>
<body>

<div class="playlist-card">

    <h1 class="title">
        🎵 Create Playlist
    </h1>

    <p class="subtitle">
        Create your own music playlist and organize songs
    </p>

    <form method="POST" enctype="multipart/form-data">

        <label>
            🎶 Playlist Name
        </label>

        <input
            type="text"
            name="playlist_name"
            class="form-control"
            placeholder="Example: My Gym Songs"
            maxlength="50"
            required>

        <div class="text-note">
            Maximum 50 characters allowed
        </div>

        <label class="mt-3">
            🖼 Playlist Cover Image
        </label>

        <input
            type="file"
            name="cover_image"
            class="form-control">

        <div class="text-note">
            Upload JPG, PNG or JPEG image
        </div>

        <button
            type="submit"
            class="btn-create">
            ➕ Create Playlist
        </button>

        <a href="/songs"
           class="btn btn-secondary btn-back">
           ⬅ Back To Music Library
        </a>

    </form>

</div>

</body>
</html>
