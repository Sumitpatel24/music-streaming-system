<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
    body{
         background:#0d1117;
         color:white;
    }

    .card{
         max-width:650px;
         margin:60px auto;
         background:#161b22;
         padding:40px;
         border-radius:20px;
         box-shadow:0 0 25px rgba(0,255,150,0.15);
    }

    h1,h2{
         color:white;
         font-weight:bold;
         margin-bottom:30px;
    }

    label{
          color:#ffffff;
          font-size:18px;
          margin-bottom:8px;
          display:block;
    }

       .form-control{
          background:#21262d;
          color:white;
          border:1px solid #30363d;
          height:50px;
    }

       .form-control:focus{ 
           background:#21262d;
           color:white;
           border-color:#0d6efd;
           box-shadow:none;
    }

       .btn{
           padding:10px 20px;
           font-size:16px;
    }
    </style>
</head>

<body>

<div class="card">

    <h1 class="text-center">👤 Edit Profile</h1>

    <form method="POST">

        <div class="mb-3">
            <label>Username</label>
            <input type="text"
                   name="username"
                   value="{{ user[1] }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email"
                   name="email"
                   value="{{ user[2] }}"
                   class="form-control">
        </div>

        <button type="submit"
                class="btn btn-success">
            Update Profile
        </button>

        <a href="/profile"
           class="btn btn-secondary">
            Back
        </a>

    </form>

</div>

</body>
</html>
