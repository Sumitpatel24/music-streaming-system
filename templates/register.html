<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#000000,#0d1117,#161b22);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
}

.register-card{
    width:500px;
    background:rgba(22,27,34,0.95);
    padding:40px;
    border-radius:25px;
    border:1px solid #30363d;
    box-shadow:0 0 35px rgba(0,255,150,0.15);
}

.logo{
    text-align:center;
    font-size:70px;
    margin-bottom:10px;
}

.title{
    text-align:center;
    color:white;
    font-size:38px;
    font-weight:bold;
}

.subtitle{
    text-align:center;
    color:#8b949e;
    margin-bottom:30px;
}

.form-label{
    color:white;
    font-weight:600;
    margin-bottom:8px;
}

.form-control{
    height:55px;
    background:#21262d;
    border:1px solid #30363d;
    color:white;
    border-radius:12px;
    margin-bottom:15px;
}

.form-control::placeholder{
    color:#9ca3af;
    opacity:1;
}

.form-control:focus{
    background:#21262d;
    color:white;
    border-color:#1DB954;
    box-shadow:0 0 12px rgba(29,185,84,0.4);
}

.btn-register{
    width:100%;
    height:55px;
    background:#1DB954;
    border:none;
    border-radius:12px;
    color:white;
    font-size:18px;
    font-weight:bold;
    margin-top:10px;
    transition:0.3s;
}

.btn-register:hover{
    background:#18a34a;
}

.login-link{
    text-align:center;
    margin-top:25px;
    color:#8b949e;
}

.login-link a{
    color:#1DB954;
    text-decoration:none;
    font-weight:700;
}

.login-link a:hover{
    color:#22ff77;
}

.error-box{
    background:#ff4d4f;
    color:white;
    padding:12px;
    border-radius:10px;
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="register-card">

    <div class="logo">
        🎵
    </div>

    <h1 class="title">
        Create Account
    </h1>

    <p class="subtitle">
        Join Music Library Today
    </p>

    <form method="POST">

        <label class="form-label">
            👤 Username
        </label>

        <input
            type="text"
            name="username"
            class="form-control"
            placeholder="Enter Username"
            required>

        <label class="form-label">
            📧 Email
        </label>

        <input
            type="email"
            name="email"
            class="form-control"
            placeholder="Enter Email"
            required>

        <label class="form-label">
            🔒 Password
        </label>

        <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Create Password"
            required>

        <button
            type="submit"
            class="btn-register">
            Create Account
        </button>

    </form>
    <br>
    {% if error %}

        <div class="error-box">

             ❌ {{ error }}

        </div>

        {% endif %}

    <div class="login-link">

        Already have an account?

        <a href="/login">
            Login Here
        </a>

    </div>

</div>

</body>
</html>
