<!DOCTYPE html>
<html>
<head>
    <title>Add Song</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>

        body{
            background:#0d1117;
            color:white;
        }

        .box{
            width:550px;
            margin:50px auto;
            background:#161b22;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,255,150,0.15);
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            font-weight:bold;
        }

        label{
            margin-bottom:8px;
            font-weight:500;
        }

        .form-control{
            background:#21262d;
            color:white;
            border:1px solid #30363d;
        }

        .form-control:focus{
            background:#21262d;
            color:white;
            border-color:#0d6efd;
            box-shadow:none;
        }

        select.form-control{
            height:45px;
        }
        
        .error-box{
          background:#ff4d4f;
          color:white;
          padding:12px;
          border-radius:10px;
          text-align:center;
          margin-bottom:15px;
        }
    </style>

</head>

<body>

<div class="box">
    
    {% if error %}
    
    <div class="error-box">
        ❌ {{ error }}
    
    </div>
    
    {% endif %}

    <h1>🎵 Add Song</h1>

    <form method="POST" enctype="multipart/form-data">

       <div class="mb-3">
    <label>🎵 Song Name</label>
    <input
        type="text"
        name="song_name"
        class="form-control"
        placeholder="Enter Song Name"
        required>
 </div>

        <div class="mb-3">
            <label>Singer Name</label>
            <input
                type="text"
                name="singer"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Category</label>
            <select
                name="category"
                class="form-control"
                required>

                <option value="">Select Category</option>
                <option value="Bollywood">Bollywood</option>
                <option value="Punjabi">Punjabi</option>
                <option value="English">English</option>
                <option value="LoFi">LoFi</option>
                <option value="Bhajan">Bhajan</option>

            </select>
        </div>

        <div class="mb-3">
            <label>Audio File</label>
            <input
                type="file"
                name="audio"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Song Cover Image</label>
            <input
                type="file"
                name="image"
                class="form-control"
                required>
        </div>

        <button
            type="submit"
            class="btn btn-success w-100 fw-bold">
                ➕ Add Song
        </button>

        <a href="/admin"
            class="btn btn-dark w-100 mt-2 fw-bold">
             ← Back To Dashboard
        </a>

    </form>

</div>
<script>
    document.querySelector('input[name="image"]').onchange = function(e){

    let file = e.target.files[0];

    if(file){

        document.getElementById("preview").src =
        URL.createObjectURL(file);

        document.getElementById("preview").style.display = "block";
    }
}
</script>
</body>
</html>
